<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>登入測試專用版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-900 flex items-center justify-center h-screen">

    <div id="login-screen" class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
        <h2 class="text-xl font-black mb-6">系統登入</h2>
        <input type="text" id="login_user" class="w-full p-3 mb-3 border rounded-xl bg-slate-100" placeholder="帳號">
        <input type="password" id="login_pass" class="w-full p-3 mb-6 border rounded-xl bg-slate-100" placeholder="密碼">
        <button onclick="performLogin()" class="w-full bg-blue-700 text-white py-3 rounded-xl font-bold">登入</button>
        <p id="msg" class="text-red-500 mt-4 text-xs font-bold hidden">帳號或密碼錯誤</p>
    </div>

    <div id="main-system" class="hidden">
        <h1 class="text-white text-center p-10 text-2xl font-black">登入成功！</h1>
        <button onclick="location.reload()" class="block mx-auto bg-white px-6 py-2 rounded-full font-bold">重置系統</button>
    </div>

    <script>
        const users = {
            "admin": "wangan999",
            "staff": "staff115",
            "guest": "guest888"
        };

        function performLogin() {
            const u = document.getElementById('login_user').value.trim().toLowerCase();
            const p = document.getElementById('login_pass').value.trim();
            
            if (users[u] && users[u] === p) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-system').classList.remove('hidden');
                alert("登入成功！");
            } else {
                document.getElementById('msg').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
