<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPUST 澎科大 - 長者健康評估系統【澎邱完整版】</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: bold; }
        .theme-btn.active { background-color: #dbeafe; border-color: #1e40af; color: #1e40af; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20">

<header class="bg-blue-800 text-white p-5 sticky top-0 z-50 shadow-md text-center">
    <h1 class="text-xl font-bold italic">NPUST 長者全人健康評估 <span class="text-xs bg-yellow-400 text-blue-900 px-2 py-0.5 rounded ml-1 font-bold">澎邱完整版</span></h1>
</header>

<nav class="flex overflow-x-auto bg-white border-b sticky top-[72px] z-40 no-scrollbar shadow-sm">
    <button onclick="showTab('base')" id="btn-base" class="tab-btn min-w-[90px] p-4 text-xs active">1.基本資料</button>
    <button onclick="showTab('cog')" id="btn-cog" class="tab-btn min-w-[90px] p-4 text-xs">2.認知功能</button>
    <button onclick="showTab('phy')" id="btn-phy" class="tab-btn min-w-[90px] p-4 text-xs">3.肌力表現</button>
    <button onclick="showTab('life')" id="btn-life" class="tab-btn min-w-[90px] p-4 text-xs">4.生活營養</button>
    <button onclick="showTab('psy')" id="btn-psy" class="tab-btn min-w-[90px] p-4 text-xs">5.心理社會</button>
    <button onclick="showTab('result')" id="btn-result" class="tab-btn min-w-[90px] p-4 text-xs text-blue-700 font-black">6.報表結案</button>
</nav>

<main class="container mx-auto px-4 py-6 max-w-2xl">
    <section id="tab-base" class="tab-content active">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="font-bold text-blue-900 mb-4 border-b pb-2">受試者基本資訊</h2>
            <div class="space-y-4">
                <div><label class="text-xs font-bold text-slate-400">姓名</label><input type="text" id="b_name" class="w-full p-2 border rounded bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs font-bold text-slate-400">性別</label><select id="b_gender" onchange="judgeAllPhy()" class="w-full p-2 border rounded"><option value="1">1.男</option><option value="2">2.女</option></select></div>
                    <div><label class="text-xs font-bold text-slate-400">年齡</label><input type="number" id="b_age" oninput="judgeAllPhy()" class="w-full p-2 border rounded" value="65"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="tab-cog" class="tab-content">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="font-bold text-blue-900 mb-4 border-b pb-2">認知評估</h2>
            <div class="mb-4"><label class="text-sm font-bold block mb-2 text-blue-700">點選題組施測</label>
                <div class="flex gap-2">
                    <button onclick="setTheme('A')" id="tA" class="theme-btn flex-1 py-2 border rounded text-xs bg-white font-bold transition">題組 A</button>
                    <button onclick="setTheme('B')" id="tB" class="theme-btn flex-1 py-2 border rounded text-xs bg-white font-bold transition">題組 B</button>
                    <button onclick="setTheme('C')" id="tC" class="theme-btn flex-1 py-2 border rounded text-xs bg-white font-bold transition">題組 C</button>
                </div>
                <div id="word-display" class="mt-3 p-3 bg-blue-50 text-blue-800 text-sm text-center rounded hidden font-bold italic"></div>
                <div id="memory-grid" class="mt-4 space-y-2"></div>
            </div>
            <div class="pt-4 border-t">
                <label class="text-sm font-bold block mb-2 text-slate-500">時間定向得分</label>
                <select id="c_time" class="w-full p-2 border rounded text-sm"><option value="3">4項正確 (3分)</option><option value="2">3項正確 (2分)</option><option value="1">1-2項正確 (1分)</option><option value="0">0項正確 (0分)</option></select>
            </div>
        </div>
    </section>

    <section id="tab-phy" class="tab-content">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100">
            <h2 class="font-bold text-blue-900 mb-4 border-b pb-2">肌力測驗 (自動判定)</h2>
            <div class="space-y-4">
                <div class="p-3 bg-slate-50 rounded-xl">
                    <label class="text-sm font-bold block mb-1">30秒椅子坐立 (次數)</label>
                    <div class="flex items-center gap-4">
                        <input type="number" id="p_chair" oninput="judgeAllPhy()" class="flex-1 p-3 border rounded text-xl font-black text-blue-700" placeholder="0">
                        <div id="r_chair" class="w-28 text-center font-bold text-xs text-blue-800 bg-white py-2 rounded-lg border shadow-sm">--</div>
                    </div>
                </div>
                <div class="p-3 bg-slate-50 rounded-xl">
                    <label class="text-sm font-bold block mb-1">手臂屈舉 (次數)</label>
                    <div class="flex items-center gap-4">
                        <input type="number" id="p_arm" oninput="judgeAllPhy()" class="flex-1 p-3 border rounded text-xl font-black text-blue-700" placeholder="0">
                        <div id="r_arm" class="w-28 text-center font-bold text-xs text-blue-800 bg-white py-2 rounded-lg border shadow-sm">--</div>
                    </div>
                </div>
                <div class="p-3 bg-slate-50 rounded-xl">
                    <label class="text-sm font-bold block mb-1">4公尺行走秒數</label>
                    <div class="flex items-center gap-4">
                        <input type="number" id="p_gait" step="0.1" oninput="judgeAllPhy()" class="flex-1 p-3 border rounded text-xl font-black text-green-700" placeholder="0.0">
                        <div id="s_gait" class="w-28 text-center font-bold text-xs text-green-800 bg-white py-2 rounded-lg border shadow-sm">-- 分</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="tab-life" class="tab-content"><div class="bg-white p-6 rounded-2xl border"><h2 class="font-bold text-blue-900 border-b pb-2 mb-4">生活營養</h2><div class="space-y-4 text-sm"><div><label class="font-bold block">服藥管理</label><select id="l_med" class="w-full p-2 border rounded"><option value="3">能自行負責</option><option value="2">需提醒</option><option value="0">不能服用</option></select></div><div><label class="font-bold block">蔬菜攝取</label><select id="n_veg" class="w-full p-2 border rounded"><option value="3">每天</option><option value="2">4-6天</option><option value="1">1-3天</option></select></div></div></div></section>
    <section id="tab-psy" class="tab-content"><div class="bg-white p-6 rounded-2xl border"><h2 class="font-bold text-purple-900 border-b pb-2 mb-4">心理社會</h2><div class="space-y-4 text-sm"><div><label class="font-bold block">親友互動</label><select id="ps_1" class="w-full p-2 border rounded"><option value="3">5-7天</option><option value="2">1-4天</option><option value="0">沒有</option></select></div><div><label class="font-bold block">睡眠困擾 (反向)</label><select id="ps_2" class="w-full p-2 border rounded"><option value="3">從未</option><option value="1">有時</option><option value="0">經常</option></select></div><div><label class="font-bold block">孤獨感 (反向)</label><select id="ps_3" class="w-full p-2 border rounded"><option value="3">從不</option><option value="1">常常</option><option value="0">總是</option></select></div></div></div></section>

    <section id="tab-result" class="tab-content space-y-6">
        <div class="p-6 bg-blue-50 rounded-3xl border-2 border-blue-200 text-center space-y-4">
            <button onclick="generateFinalReport()" class="w-full bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl">第一步：產生報表分析</button>
            <button id="saveBtn" onclick="submitToGoogle()" class="hidden w-full bg-green-600 text-white font-black py-4 rounded-2xl shadow-xl">第二步：上傳資料至試算表</button>
        </div>
        <div id="final-report" class="hidden bg-white p-8 rounded-[40px] border-t-[12px] border-blue-600 shadow-2xl">
            <h2 class="text-3xl font-black text-blue-900 border-b-2 pb-6 mb-8 text-center">評估報表書</h2>
            <div class="grid grid-cols-2 gap-4 mb-10 text-center bg-slate-50 p-6 rounded-3xl border">
                <div><p class="text-xs text-slate-400 font-bold uppercase">受試姓名</p><p id="rn" class="font-black text-xl text-slate-800 mt-1">--</p></div>
                <div><p class="text-xs text-slate-400 font-bold uppercase">加權總分</p><p id="rt" class="font-black text-3xl text-blue-600 mt-1">--</p></div>
            </div>
            <div id="score_bars" class="space-y-6 mb-10 px-2"></div>
            <div class="bg-blue-800 text-white p-4 rounded-2xl text-center shadow-lg"><p id="rs" class="text-xl font-black italic">--</p></div>
        </div>
    </section>
</main>

<script>
    // 配置
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz4Mgv3fGd56kUr4IrckpUDcbFNFUEcG3Ef7eUDDjNuulFaBLLRo4mdr28TNGyeaTqZOw/exec';
    const PHY_NORMS = {
        chair: { '1': { '65':[13,15,18,22],'70':[12,14,17,21],'75':[11,12,16,19],'80':[10,12,15,17],'85':[8,10,13,16],'90':[6,8,11,14] }, '2': { '65':[11,14,16,20],'70':[10,13,15,19],'75':[9,12,14,18],'80':[8,11,13,16],'85':[3,9,12,15],'90':[0,6,11,14] } },
        arm: { '1': { '65':[16,17,21,25],'70':[15,16,20,24],'75':[14,15,19,22],'80':[13,14,18,21],'85':[11,13,17,20],'90':[8,10,15,18] }, '2': { '65':[15,17,20,24],'70':[14,16,20,23],'75':[13,15,19,22],'80':[13,14,18,21],'85':[11,13,17,20],'90':[9,12,16,20] } }
    };

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        window.scrollTo(0,0);
    }

    function setTheme(t) {
        const themes = { 'A':['鼻子','石頭','學校','可愛','紅色'], 'B':['臉孔','玻璃','醫院','善良','藍色'], 'C':['手','塑膠','公園','大方','綠色'] };
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('t' + t).classList.add('active');
        const d = document.getElementById('word-display');
        d.innerText = "測驗組 " + t + "： " + themes[t].join('、');
        d.classList.remove('hidden');
        const grid = document.getElementById('memory-grid');
        grid.innerHTML = themes[t].map((w, i) => `<div class="flex justify-between items-center bg-white p-3 rounded-xl border border-slate-200 shadow-sm"><span class="text-sm font-black text-slate-700">${w}</span><select id="dm_${i}" class="text-xs p-1 border rounded bg-slate-50"><option value="3">未提示</option><option value="2">類別提示</option><option value="1">選擇提示</option><option value="0">未回答</option></select></div>`).join('');
    }

    function judgeAllPhy() {
        const g = document.getElementById('b_gender').value, a = parseInt(document.getElementById('b_age').value);
        const k = a >= 90 ? '90' : (a >= 85 ? '85' : (a >= 80 ? '80' : (a >= 75 ? '75' : (a >= 70 ? '70' : '65'))));
        ['chair','arm'].forEach(type => {
            const val = parseInt(document.getElementById('p_' + type).value) || 0;
            const norm = PHY_NORMS[type][g][k];
            let r = "不好", s = 0;
            if(val >= norm[3]) { r = "很好"; s = 4; } else if(val >= norm[2]) { r = "尚好"; s = 3; } else if(val >= norm[1]) { r = "普通"; s = 2; } else if(val >= norm[0]) { r = "稍差"; s = 1; }
            document.getElementById('r_' + type).innerText = r + " (" + s + "分)";
        });
        const gait = parseFloat(document.getElementById('p_gait').value) || 0;
        let gs = 0; if(gait > 0) { if(gait < 3.5) gs = 3; else if(gait <= 4.9) gs = 2; else if(gait <= 8.0) gs = 1; }
        document.getElementById('s_gait').innerText = gs + " 分";
    }

    function generateFinalReport() {
        let m = 0; for(let i=0; i<5; i++) { const el = document.getElementById('dm_'+i); m += el ? parseInt(el.value) : 0; }
        const sc = (m >= 15 ? 3 : (m >= 10 ? 2 : (m >= 5 ? 1 : 0))) + parseInt(document.getElementById('c_time').value);
        const getV = (id) => { const text = document.getElementById(id).innerText; const match = text.match(/\d/); return match ? parseInt(match[0]) : 0; };
        const sp = getV('r_chair') + getV('r_arm') + getV('s_gait');
        const sl = parseInt(document.getElementById('l_med').value);
        const sn = parseInt(document.getElementById('n_veg').value);
        const sps = parseInt(document.getElementById('ps_1').value) + parseInt(document.getElementById('ps_2').value) + parseInt(document.getElementById('ps_3').value);

        const pc = (sc/6)*100, pp = (sp/11)*100, pl = (sl/3)*100, pn = (sn/3)*100, ps = (sps/9)*100;
        const total = (pc + pp + pl + pn + ps) / 5;

        document.getElementById('final-report').classList.remove('hidden');
        document.getElementById('saveBtn').classList.remove('hidden');
        document.getElementById('rn').innerText = document.getElementById('b_name').value || "受試者";
        document.getElementById('rt').innerText = total.toFixed(1) + "%";
        document.getElementById('rs').innerText = total >= 70 ? "行動能力正常" : "具備衰弱風險";
        
        const bars = [{n:"認知",p:pc}, {n:"肌力",p:pp}, {n:"生活",p:pl}, {n:"營養",p:pn}, {n:"心理",p:ps}];
        document.getElementById('score_bars').innerHTML = bars.map(b => `<div class="text-[10px] flex justify-between font-bold text-slate-400"><span>${b.n}</span><span>${b.p.toFixed(0)}%</span></div><div class="bg-slate-100 h-2 rounded-full overflow-hidden mb-4 shadow-inner"><div class="bg-blue-600 h-full" style="width:${b.p}%"></div></div>`).join('');
    }

    async function submitToGoogle() {
    const btn = document.getElementById('saveBtn');
    const nameVal = document.getElementById('b_name').value;
    if(!nameVal) return alert("請填寫姓名！");
    
    btn.disabled = true;
    btn.innerText = "📍 同步中...";

    // 重新抓取數值
    let m = 0; 
    for(let i=0; i<5; i++) { m += parseInt(document.getElementById('dm_'+i)?.value || 0); }
    const s_cog = (m >= 15 ? 3 : (m >= 10 ? 2 : (m >= 5 ? 1 : 0))) + parseInt(document.getElementById('c_time').value);
    
    const getV = (id) => {
        const text = document.getElementById(id).innerText;
        const match = text.match(/\d+/); // 抓取數字
        return match ? match[0] : "0";
    };

    // 封裝參數 (必須與 GAS 的 p.u_xxx 對應)
    const params = new URLSearchParams();
    params.append('u_name', nameVal);
    params.append('u_gender', document.getElementById('b_gender').value);
    params.append('u_age', document.getElementById('b_age').value);
    params.append('u_total', document.getElementById('rt').innerText);
    params.append('u_cog', s_cog);
    params.append('u_phy', (parseInt(getV('r_chair')) + parseInt(getV('r_arm')) + parseInt(getV('s_gait'))));
    params.append('u_life', document.getElementById('l_med').value);
    params.append('u_nutri', document.getElementById('n_veg').value);
    params.append('u_psy', (parseInt(document.getElementById('ps_1').value) + parseInt(document.getElementById('ps_2').value) + parseInt(document.getElementById('ps_3').value)));
    params.append('u_chair', document.getElementById('p_chair').value);
    params.append('u_arm', document.getElementById('p_arm').value);
    params.append('u_gait', document.getElementById('p_gait').value);
    params.append('u_status', document.getElementById('rs').innerText);

    try {
        await fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params.toString()
        });
        alert("✅ 儲存成功！資料已寫入試算表。");
        btn.innerText = "已存檔";
    } catch(e) {
        alert("連線失敗");
        btn.disabled = false;
        btn.innerText = "重試";
    }
}
</script>
</body>
</html>
